<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Focus — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#07070f;--bg2:#0c0c18;--surf:#111122;--surf2:#181830;
  --border:#1e1e38;--accent:#e8ff47;--accent-rgb:232,255,71;
  --text:#eeedf8;--text2:#7878a0;--muted:#3a3a58;
  --p-high:#ff5c5c;--p-med:#ffaa2e;--p-low:#4fffb0;--p-none:#5c5c80;
  --f-d:'Syne',sans-serif;--f-b:'DM Sans',sans-serif;
  --r:12px;--tr:.25s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{background:var(--bg);color:var(--text);font-family:var(--f-b);font-weight:300;min-height:100vh;display:flex;flex-direction:column}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input,textarea,select{font-family:inherit}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 28px;border-bottom:1px solid var(--border);
  background:rgba(7,7,15,.9);backdrop-filter:blur(14px);
  position:sticky;top:0;z-index:50;
}
.logo{font-family:var(--f-d);font-size:1.3rem;font-weight:800;letter-spacing:-.04em}
.logo span{color:var(--accent)}
.top-meta{display:flex;align-items:center;gap:16px}
.date-pill{
  background:var(--surf2);border:1px solid var(--border);border-radius:100px;
  padding:6px 14px;font-size:.8rem;color:var(--text2);
}
.top-stats{display:flex;gap:10px}
.stat-chip{
  background:var(--surf2);border:1px solid var(--border);border-radius:100px;
  padding:6px 12px;font-size:.75rem;font-family:var(--f-d);font-weight:600;
  display:flex;align-items:center;gap:5px;
}
.stat-chip .dot{width:7px;height:7px;border-radius:50%}

/* ── MAIN LAYOUT ── */
.app{display:grid;grid-template-columns:300px 1fr;flex:1;height:calc(100vh - 57px);overflow:hidden}

/* ── SIDEBAR / ADD PANEL ── */
.add-panel{
  border-right:1px solid var(--border);padding:24px 20px;
  background:var(--bg2);overflow-y:auto;display:flex;flex-direction:column;gap:20px;
}
.panel-title{font-family:var(--f-d);font-size:.72rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);margin-bottom:4px}

.fg{display:flex;flex-direction:column;gap:6px}
.fg label{font-size:.75rem;font-weight:500;text-transform:uppercase;letter-spacing:.06em;color:var(--text2)}
.fg input,.fg textarea,.fg select{
  background:var(--surf);border:1.5px solid var(--border);border-radius:8px;
  padding:10px 13px;color:var(--text);font-size:.88rem;outline:none;
  transition:border-color var(--tr),box-shadow var(--tr);resize:none;
}
.fg input:focus,.fg textarea:focus,.fg select:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.1);
}
.fg textarea{min-height:80px}

/* Priority select colour hint */
.pri-high{color:var(--p-high)}
.pri-med{color:var(--p-med)}
.pri-low{color:var(--p-low)}

/* Tag chips input */
.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.tag-chip{
  background:var(--surf2);border:1px solid var(--border);border-radius:100px;
  padding:4px 10px 4px 12px;font-size:.75rem;color:var(--text2);
  display:flex;align-items:center;gap:6px;
}
.tag-chip button{font-size:.7rem;color:var(--muted);padding:0;line-height:1;transition:color var(--tr)}
.tag-chip button:hover{color:var(--p-high)}

.add-task-btn{
  width:100%;background:var(--accent);color:var(--bg);font-family:var(--f-d);
  font-size:.88rem;font-weight:700;letter-spacing:.04em;padding:13px;
  border-radius:100px;transition:opacity var(--tr),transform .2s;
}
.add-task-btn:hover{opacity:.9;transform:translateY(-1px)}

/* Filter pills */
.filter-section{padding-top:16px;border-top:1px solid var(--border)}
.filter-pills{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.fpill{
  background:var(--surf2);border:1px solid var(--border);border-radius:100px;
  padding:5px 12px;font-size:.78rem;color:var(--text2);
  transition:background var(--tr),border-color var(--tr),color var(--tr);
}
.fpill.active{background:var(--accent);border-color:var(--accent);color:var(--bg);font-weight:600}

/* ── TASK BOARD ── */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;padding:24px;overflow-y:auto;background:var(--bg);align-content:start}

.column{display:flex;flex-direction:column;gap:12px}
.col-header{
  display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}
.col-title{font-family:var(--f-d);font-size:.8rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.col-count{
  background:var(--surf2);border:1px solid var(--border);
  border-radius:100px;padding:2px 9px;font-size:.72rem;font-family:var(--f-d);font-weight:700;
}

/* Task card */
.task-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;cursor:grab;user-select:none;
  transition:border-color var(--tr),box-shadow var(--tr),transform var(--tr),opacity var(--tr);
  position:relative;
}
.task-card:hover{border-color:rgba(var(--accent-rgb),.3);box-shadow:0 8px 24px rgba(0,0,0,.35)}
.task-card.dragging{opacity:.4;transform:scale(.97)}
.task-card.drag-over{border-color:var(--accent);box-shadow:0 0 0 2px rgba(var(--accent-rgb),.2)}
.task-card.done .task-title{text-decoration:line-through;color:var(--text2)}

/* Priority bar */
.pri-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r)}
.pri-bar.high{background:var(--p-high)}
.pri-bar.med{background:var(--p-med)}
.pri-bar.low{background:var(--p-low)}
.pri-bar.none{background:var(--muted)}

.task-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.task-title{font-family:var(--f-d);font-size:.9rem;font-weight:600;line-height:1.4;flex:1}
.task-actions{display:flex;gap:4px;opacity:0;transition:opacity var(--tr)}
.task-card:hover .task-actions{opacity:1}
.task-act{
  width:26px;height:26px;border-radius:6px;background:var(--surf2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;font-size:.75rem;
  transition:background var(--tr),border-color var(--tr);
}
.task-act:hover{background:var(--border)}
.task-act.del:hover{background:var(--p-high);border-color:var(--p-high)}

.task-desc{font-size:.8rem;color:var(--text2);line-height:1.6;margin-bottom:10px}
.task-meta{display:flex;align-items:center;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.pri-badge{
  border-radius:100px;padding:2px 9px;font-size:.68rem;font-weight:600;font-family:var(--f-d);
  letter-spacing:.04em;
}
.pri-badge.high{background:rgba(255,92,92,.15);color:var(--p-high);border:1px solid rgba(255,92,92,.25)}
.pri-badge.med{background:rgba(255,170,46,.12);color:var(--p-med);border:1px solid rgba(255,170,46,.2)}
.pri-badge.low{background:rgba(79,255,176,.1);color:var(--p-low);border:1px solid rgba(79,255,176,.2)}
.pri-badge.none{background:var(--surf2);color:var(--text2);border:1px solid var(--border)}

.task-tag{
  background:var(--surf2);border:1px solid var(--border);border-radius:100px;
  padding:2px 8px;font-size:.68rem;color:var(--text2);
}

.task-due{font-size:.75rem;color:var(--text2);display:flex;align-items:center;gap:4px}
.task-due.overdue{color:var(--p-high)}

/* Progress ring at bottom of task */
.task-footer{
  display:flex;align-items:center;justify-content:space-between;
  padding-top:10px;border-top:1px solid var(--border);
}
.check-btn{
  display:flex;align-items:center;gap:7px;font-size:.78rem;color:var(--text2);
  transition:color var(--tr);
}
.check-btn:hover{color:var(--p-low)}
.check-box{
  width:16px;height:16px;border-radius:4px;border:1.5px solid var(--muted);
  display:flex;align-items:center;justify-content:center;font-size:.7rem;
  transition:background var(--tr),border-color var(--tr);
}
.check-box.done{background:var(--p-low);border-color:var(--p-low);color:var(--bg);font-weight:700}

/* Column drop zone */
.drop-zone{
  min-height:60px;border:2px dashed transparent;border-radius:var(--r);
  transition:border-color var(--tr),background var(--tr);
  display:flex;align-items:center;justify-content:center;
  font-size:.8rem;color:var(--muted);
}
.drop-zone.active{border-color:var(--accent);background:rgba(var(--accent-rgb),.04);color:var(--accent)}
.empty-col{
  text-align:center;padding:30px 10px;color:var(--muted);font-size:.82rem;
  border:2px dashed var(--border);border-radius:var(--r);
}

/* Toast */
.toast{
  position:fixed;bottom:24px;right:24px;
  background:var(--surf2);border:1px solid var(--border);border-radius:100px;
  padding:11px 20px;font-size:.85rem;z-index:999;
  opacity:0;transform:translateY(10px);transition:.3s;
}
.toast.show{opacity:1;transform:translateY(0)}

/* ── RESPONSIVE ── */
@media(max-width:1024px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:768px){
  .app{grid-template-columns:1fr;height:auto}
  .add-panel{border-right:none;border-bottom:1px solid var(--border);max-height:60vh}
  .board{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="logo">Fo<span>cus</span></div>
  <div class="top-meta">
    <div class="date-pill" id="date-pill"></div>
    <div class="top-stats">
      <div class="stat-chip"><div class="dot" style="background:var(--p-high)"></div><span id="s-todo">0</span> To Do</div>
      <div class="stat-chip"><div class="dot" style="background:var(--p-med)"></div><span id="s-prog">0</span> In Progress</div>
      <div class="stat-chip"><div class="dot" style="background:var(--p-low)"></div><span id="s-done">0</span> Done</div>
    </div>
  </div>
</div>

<div class="app">

  <!-- ADD PANEL -->
  <div class="add-panel">
    <div>
      <p class="panel-title">Add New Task</p>
    </div>

    <div class="fg">
      <label>Task Title *</label>
      <input type="text" id="inp-title" placeholder="What needs to be done?"/>
    </div>

    <div class="fg">
      <label>Description</label>
      <textarea id="inp-desc" placeholder="Optional notes…"></textarea>
    </div>

    <div class="fg">
      <label>Priority</label>
      <select id="inp-pri">
        <option value="none">⚪ None</option>
        <option value="low">🟢 Low</option>
        <option value="med" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
    </div>

    <div class="fg">
      <label>Due Date</label>
      <input type="date" id="inp-due"/>
    </div>

    <div class="fg">
      <label>Status</label>
      <select id="inp-status">
        <option value="todo">To Do</option>
        <option value="progress">In Progress</option>
        <option value="done">Done</option>
      </select>
    </div>

    <div class="fg">
      <label>Tags (press Enter)</label>
      <input type="text" id="inp-tag" placeholder="e.g. design, urgent"/>
      <div class="tag-row" id="tag-row"></div>
    </div>

    <button class="add-task-btn" id="add-btn">＋ Add Task</button>

    <div class="filter-section">
      <p class="panel-title">Filter</p>
      <div class="filter-pills">
        <button class="fpill active" data-f="all">All</button>
        <button class="fpill" data-f="high">🔴 High</button>
        <button class="fpill" data-f="med">🟡 Med</button>
        <button class="fpill" data-f="low">🟢 Low</button>
        <button class="fpill" data-f="overdue">⚠️ Overdue</button>
      </div>
    </div>

    <div class="filter-section">
      <p class="panel-title" style="margin-bottom:10px">Search</p>
      <input type="text" id="search" placeholder="Search tasks…" style="background:var(--surf);border:1.5px solid var(--border);border-radius:8px;padding:9px 13px;color:var(--text);font-size:.85rem;outline:none;width:100%;transition:.25s" onfocus="this.style.borderColor='var(--accent)'" onblur="this.style.borderColor='var(--border)'"/>
    </div>

    <div class="filter-section">
      <button style="width:100%;padding:10px;border-radius:8px;background:var(--surf2);border:1px solid var(--border);font-size:.82rem;color:var(--p-high);transition:.2s" onmouseover="this.style.borderColor='var(--p-high)'" onmouseout="this.style.borderColor='var(--border)'" onclick="clearDone()">
        🗑 Clear Completed
      </button>
    </div>
  </div>

  <!-- BOARD -->
  <div class="board" id="board">
    <div class="column" id="col-todo">
      <div class="col-header">
        <span class="col-title" style="color:var(--p-high)">To Do</span>
        <span class="col-count" id="cnt-todo">0</span>
      </div>
      <div class="drop-zone" id="dz-todo" data-col="todo">Drop here</div>
    </div>
    <div class="column" id="col-progress">
      <div class="col-header">
        <span class="col-title" style="color:var(--p-med)">In Progress</span>
        <span class="col-count" id="cnt-progress">0</span>
      </div>
      <div class="drop-zone" id="dz-progress" data-col="progress">Drop here</div>
    </div>
    <div class="column" id="col-done">
      <div class="col-header">
        <span class="col-title" style="color:var(--p-low)">Done ✓</span>
        <span class="col-count" id="cnt-done">0</span>
      </div>
      <div class="drop-zone" id="dz-done" data-col="done">Drop here</div>
    </div>
  </div>

</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ── STATE ─────────────────────────────────────────────────────────
let tasks = JSON.parse(localStorage.getItem('focus-tasks') || '[]');
let tags  = [];
let dragId = null;
let activeFilter = 'all';
let searchQ = '';

// ── SEED DATA ─────────────────────────────────────────────────────
if (tasks.length === 0) {
  tasks = [
    {id:uid(),title:"Build portfolio website",desc:"Complete the redesign with dark mode and animations.",pri:"high",due:offsetDate(2),status:"progress",tags:["design","code"],done:false,created:Date.now()},
    {id:uid(),title:"Study for maths exam",desc:"Focus on integration and derivatives.",pri:"high",due:offsetDate(1),status:"todo",tags:["study"],done:false,created:Date.now()-1e6},
    {id:uid(),title:"Read 30 pages of design book",desc:"",pri:"low",due:offsetDate(5),status:"todo",tags:["reading"],done:false,created:Date.now()},
    {id:uid(),title:"Set up GitHub repo",desc:"Push all projects to GitHub.",pri:"med",due:offsetDate(3),status:"progress",tags:["code"],done:false,created:Date.now()},
    {id:uid(),title:"Update résumé",desc:"",pri:"med",due:"",status:"todo",tags:[],done:false,created:Date.now()},
    {id:uid(),title:"Submit assignment",desc:"Algorithms homework due soon.",pri:"high",due:offsetDate(-1),status:"done",tags:["study"],done:true,created:Date.now()-2e6},
  ];
  save();
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }
function offsetDate(days) {
  const d = new Date();
  d.setDate(d.getDate() + days);
  return d.toISOString().split('T')[0];
}
function save() { localStorage.setItem('focus-tasks', JSON.stringify(tasks)); }

// ── DATE PILL ─────────────────────────────────────────────────────
document.getElementById('date-pill').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});

// ── RENDER ────────────────────────────────────────────────────────
function getVisible() {
  return tasks.filter(t => {
    if (activeFilter === 'high'    && t.pri !== 'high') return false;
    if (activeFilter === 'med'     && t.pri !== 'med')  return false;
    if (activeFilter === 'low'     && t.pri !== 'low')  return false;
    if (activeFilter === 'overdue' && (!t.due || t.due >= new Date().toISOString().split('T')[0])) return false;
    if (searchQ && !t.title.toLowerCase().includes(searchQ.toLowerCase()) && !t.desc.toLowerCase().includes(searchQ.toLowerCase())) return false;
    return true;
  });
}

function render() {
  const vis    = getVisible();
  const cols   = ['todo','progress','done'];
  const colEls = {todo: document.getElementById('col-todo'), progress: document.getElementById('col-progress'), done: document.getElementById('col-done')};

  // Update stats
  document.getElementById('s-todo').textContent  = tasks.filter(t=>t.status==='todo').length;
  document.getElementById('s-prog').textContent  = tasks.filter(t=>t.status==='progress').length;
  document.getElementById('s-done').textContent  = tasks.filter(t=>t.status==='done').length;

  cols.forEach(col => {
    const colVis = vis.filter(t => t.status === col);
    document.getElementById('cnt-'+col).textContent = colVis.length;

    // Remove old cards
    colEls[col].querySelectorAll('.task-card').forEach(c => c.remove());

    const dz = document.getElementById('dz-'+col);

    if (colVis.length === 0) {
      dz.style.display = 'flex';
    } else {
      dz.style.display = 'none';
      colVis.forEach(t => {
        const card = makeCard(t);
        colEls[col].appendChild(card);
      });
    }
  });
}

function makeCard(t) {
  const today = new Date().toISOString().split('T')[0];
  const overdue = t.due && t.due < today && t.status !== 'done';
  const priLabel = {high:'High',med:'Medium',low:'Low',none:'None'}[t.pri];
  const tags = t.tags.map(tg => `<span class="task-tag">${tg}</span>`).join('');
  const dueStr = t.due ? new Date(t.due+'T00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}) : '';

  const el = document.createElement('div');
  el.className = `task-card ${t.done ? 'done' : ''}`;
  el.dataset.id = t.id;
  el.draggable = true;
  el.innerHTML = `
    <div class="pri-bar ${t.pri}"></div>
    <div class="task-top">
      <p class="task-title">${t.title}</p>
      <div class="task-actions">
        <button class="task-act edit" title="Edit" data-id="${t.id}">✏️</button>
        <button class="task-act del" title="Delete" data-id="${t.id}">🗑</button>
      </div>
    </div>
    ${t.desc ? `<p class="task-desc">${t.desc}</p>` : ''}
    <div class="task-meta">
      <span class="pri-badge ${t.pri}">${priLabel}</span>
      ${tags}
    </div>
    <div class="task-footer">
      <button class="check-btn" data-id="${t.id}">
        <div class="check-box ${t.done?'done':''}">${t.done?'✓':''}</div>
        <span>${t.done ? 'Completed' : 'Mark done'}</span>
      </button>
      ${dueStr ? `<span class="task-due ${overdue?'overdue':''}">📅 ${dueStr}${overdue?' ⚠️':''}</span>` : ''}
    </div>`;

  // Drag
  el.addEventListener('dragstart', () => {
    dragId = t.id;
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => {
    dragId = null;
    el.classList.remove('dragging');
    document.querySelectorAll('.drop-zone').forEach(dz => dz.classList.remove('active'));
  });

  // Delete
  el.querySelector('.del').addEventListener('click', () => {
    tasks = tasks.filter(x => x.id !== t.id);
    save(); render(); toast('Task deleted');
  });

  // Toggle done
  el.querySelector('.check-btn').addEventListener('click', () => {
    const task = tasks.find(x => x.id === t.id);
    task.done = !task.done;
    if (task.done) task.status = 'done';
    save(); render();
  });

  // Edit (inline title)
  el.querySelector('.edit').addEventListener('click', () => {
    const task = tasks.find(x => x.id === t.id);
    const newTitle = prompt('Edit task title:', task.title);
    if (newTitle && newTitle.trim()) {
      task.title = newTitle.trim();
      save(); render();
    }
  });

  return el;
}

// ── DRAG & DROP (columns) ─────────────────────────────────────────
document.querySelectorAll('.drop-zone').forEach(dz => {
  dz.addEventListener('dragover', (e) => { e.preventDefault(); dz.classList.add('active'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('active'));
  dz.addEventListener('drop', () => {
    dz.classList.remove('active');
    if (!dragId) return;
    const task = tasks.find(t => t.id === dragId);
    if (task) {
      task.status = dz.dataset.col;
      task.done   = dz.dataset.col === 'done';
      save(); render(); toast(`Moved to ${dz.dataset.col}`);
    }
  });
});

// Also drop on column cards area
['todo','progress','done'].forEach(col => {
  const colEl = document.getElementById('col-'+col);
  colEl.addEventListener('dragover', (e) => { e.preventDefault(); document.getElementById('dz-'+col).classList.add('active'); });
  colEl.addEventListener('dragleave', (e) => {
    if (!colEl.contains(e.relatedTarget)) document.getElementById('dz-'+col).classList.remove('active');
  });
  colEl.addEventListener('drop', () => {
    document.getElementById('dz-'+col).classList.remove('active');
    if (!dragId) return;
    const task = tasks.find(t => t.id === dragId);
    if (task) {
      task.status = col;
      task.done   = col === 'done';
      save(); render();
    }
  });
});

// ── ADD TASK ─────────────────────────────────────────────────────
const currentTags = [];

document.getElementById('inp-tag').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && this.value.trim()) {
    e.preventDefault();
    const tag = this.value.trim().toLowerCase();
    if (!currentTags.includes(tag)) {
      currentTags.push(tag);
      renderTagRow();
    }
    this.value = '';
  }
});

function renderTagRow() {
  document.getElementById('tag-row').innerHTML = currentTags.map((t,i) =>
    `<div class="tag-chip">${t}<button onclick="removeTag(${i})">✕</button></div>`
  ).join('');
}

function removeTag(i) { currentTags.splice(i,1); renderTagRow(); }

document.getElementById('add-btn').addEventListener('click', () => {
  const title = document.getElementById('inp-title').value.trim();
  if (!title) { toast('Please enter a task title ⚠️'); return; }

  tasks.unshift({
    id: uid(),
    title,
    desc:   document.getElementById('inp-desc').value.trim(),
    pri:    document.getElementById('inp-pri').value,
    due:    document.getElementById('inp-due').value,
    status: document.getElementById('inp-status').value,
    tags:   [...currentTags],
    done:   false,
    created: Date.now(),
  });
  save(); render(); toast('✅ Task added!');

  // Reset form
  document.getElementById('inp-title').value = '';
  document.getElementById('inp-desc').value  = '';
  document.getElementById('inp-due').value   = '';
  currentTags.length = 0; renderTagRow();
});

// ── FILTER ───────────────────────────────────────────────────────
document.querySelectorAll('.fpill').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.fpill').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.f;
    render();
  });
});

document.getElementById('search').addEventListener('input', function() {
  searchQ = this.value;
  render();
});

function clearDone() {
  const n = tasks.filter(t => t.status === 'done').length;
  if (n === 0) { toast('No completed tasks to clear'); return; }
  tasks = tasks.filter(t => t.status !== 'done');
  save(); render(); toast(`Cleared ${n} completed task${n>1?'s':''}`);
}

// ── TOAST ─────────────────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── INIT ─────────────────────────────────────────────────────────
render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SkyLens — Weather App</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#030812;--bg2:#060d1c;--surf:#0a1228;--surf2:#0f1a35;
  --border:#142040;--accent:#38bdf8;--accent-rgb:56,189,248;
  --accent2:#818cf8;--text:#e8f4ff;--text2:#6688aa;--muted:#2a3a5a;
  --f-d:'Syne',sans-serif;--f-b:'DM Sans',sans-serif;
  --r:16px;--tr:.3s cubic-bezier(.4,0,.2,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{
  background:var(--bg);color:var(--text);font-family:var(--f-b);font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:24px 16px 48px;
  background-image:
    radial-gradient(ellipse 60% 40% at 50% 0%,rgba(56,189,248,.06) 0%,transparent 60%),
    radial-gradient(ellipse 40% 30% at 80% 80%,rgba(129,140,248,.04) 0%,transparent 50%);
}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
::selection{background:var(--accent);color:var(--bg)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}

/* ── HEADER ── */
.app-header{
  width:100%;max-width:900px;
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:32px;
}
.app-logo{font-family:var(--f-d);font-size:1.3rem;font-weight:800;letter-spacing:-.04em}
.app-logo span{color:var(--accent)}
.last-updated{font-size:.78rem;color:var(--text2)}

/* ── SEARCH ── */
.search-bar{
  display:flex;gap:10px;width:100%;max-width:900px;margin-bottom:28px;
}
.search-input{
  flex:1;background:var(--surf);border:1.5px solid var(--border);border-radius:100px;
  padding:14px 22px;color:var(--text);font-size:.95rem;outline:none;
  transition:border-color var(--tr),box-shadow var(--tr);
}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12)}
.search-input::placeholder{color:var(--text2)}
.search-btn{
  background:var(--accent);color:var(--bg);font-family:var(--f-d);
  font-size:.88rem;font-weight:700;padding:14px 26px;border-radius:100px;
  display:flex;align-items:center;gap:8px;
  transition:opacity var(--tr),transform .2s;white-space:nowrap;
}
.search-btn:hover{opacity:.9;transform:translateY(-1px)}

/* Quick city buttons */
.quick-cities{
  display:flex;flex-wrap:wrap;gap:8px;margin-bottom:32px;
  width:100%;max-width:900px;
}
.city-pill{
  background:var(--surf);border:1px solid var(--border);border-radius:100px;
  padding:7px 16px;font-size:.8rem;color:var(--text2);
  transition:background var(--tr),border-color var(--tr),color var(--tr);
}
.city-pill:hover,.city-pill.active{background:rgba(var(--accent-rgb),.1);border-color:rgba(var(--accent-rgb),.35);color:var(--accent)}

/* ── MAIN CARD ── */
.main-card{
  width:100%;max-width:900px;
  background:var(--surf);border:1px solid var(--border);border-radius:20px;
  overflow:hidden;margin-bottom:20px;
}

.main-top{
  display:grid;grid-template-columns:1fr auto;gap:24px;
  padding:32px;position:relative;overflow:hidden;
}
.main-top::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(var(--accent-rgb),.05) 0%,transparent 60%);
}
.city-name{font-family:var(--f-d);font-size:clamp(1.6rem,4vw,2.5rem);font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.country-row{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:.9rem;margin-bottom:24px}
.temp-big{font-family:var(--f-d);font-size:clamp(4rem,12vw,7rem);font-weight:800;line-height:1;letter-spacing:-.04em}
.temp-big .unit{font-size:clamp(1.5rem,4vw,2.5rem);font-weight:400;color:var(--text2);vertical-align:super}
.condition{font-size:1.1rem;color:var(--text2);margin-top:8px}
.feels{font-size:.85rem;color:var(--text2);margin-top:6px}

.weather-icon-big{
  font-size:clamp(4rem,12vw,8rem);
  filter:drop-shadow(0 0 30px rgba(var(--accent-rgb),.25));
  animation:floatIcon 4s ease-in-out infinite;
  z-index:1;
}
@keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

/* Stats strip */
.stats-strip{
  display:grid;grid-template-columns:repeat(4,1fr);
  border-top:1px solid var(--border);
}
.stat-block{
  padding:20px;text-align:center;border-right:1px solid var(--border);
  transition:background var(--tr);
}
.stat-block:last-child{border-right:none}
.stat-block:hover{background:var(--surf2)}
.sb-icon{font-size:1.4rem;margin-bottom:8px}
.sb-val{font-family:var(--f-d);font-size:1.1rem;font-weight:700}
.sb-lbl{font-size:.72rem;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;margin-top:3px}

/* ── HOURLY FORECAST ── */
.forecast-section{
  width:100%;max-width:900px;
  background:var(--surf);border:1px solid var(--border);border-radius:20px;
  padding:24px;margin-bottom:20px;
}
.sec-title{font-family:var(--f-d);font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);margin-bottom:18px}
.hourly-scroll{display:flex;gap:10px;overflow-x:auto;padding-bottom:6px}
.hourly-scroll::-webkit-scrollbar{height:3px}
.hour-item{
  min-width:76px;background:var(--surf2);border:1px solid var(--border);border-radius:12px;
  padding:14px 10px;text-align:center;flex-shrink:0;
  transition:border-color var(--tr),background var(--tr);
}
.hour-item:hover{border-color:rgba(var(--accent-rgb),.35);background:rgba(var(--accent-rgb),.05)}
.hour-item.now{border-color:var(--accent);background:rgba(var(--accent-rgb),.08)}
.h-time{font-size:.72rem;color:var(--text2);margin-bottom:8px}
.h-icon{font-size:1.5rem;margin-bottom:8px}
.h-temp{font-family:var(--f-d);font-size:.9rem;font-weight:700}
.h-rain{font-size:.68rem;color:var(--accent2);margin-top:4px}

/* ── 7-DAY FORECAST ── */
.week-list{display:flex;flex-direction:column;gap:8px}
.day-row{
  display:flex;align-items:center;background:var(--surf2);border:1px solid var(--border);
  border-radius:12px;padding:14px 18px;gap:16px;
  transition:border-color var(--tr),background var(--tr);
}
.day-row:hover{border-color:rgba(var(--accent-rgb),.25)}
.day-row.today-row{border-color:rgba(var(--accent-rgb),.3);background:rgba(var(--accent-rgb),.05)}
.dr-day{font-family:var(--f-d);font-size:.85rem;font-weight:600;min-width:50px}
.dr-icon{font-size:1.5rem}
.dr-cond{font-size:.82rem;color:var(--text2);flex:1}
.dr-bar{flex:1;height:4px;background:var(--muted);border-radius:4px;overflow:hidden}
.dr-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent2),var(--accent))}
.dr-temps{display:flex;gap:12px;align-items:center;font-family:var(--f-d);font-size:.88rem}
.dr-low{color:var(--text2)}
.dr-high{font-weight:700}

/* ── EXTRA CARDS ── */
.extra-grid{
  width:100%;max-width:900px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px;
}
.extra-card{
  background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:20px;transition:border-color var(--tr),transform var(--tr);
}
.extra-card:hover{border-color:rgba(var(--accent-rgb),.3);transform:translateY(-2px)}
.ec-label{font-size:.68rem;font-family:var(--f-d);font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text2);margin-bottom:10px}
.ec-val{font-family:var(--f-d);font-size:1.6rem;font-weight:800;color:var(--accent)}
.ec-sub{font-size:.78rem;color:var(--text2);margin-top:5px}
.uv-bar{height:6px;background:var(--muted);border-radius:4px;overflow:hidden;margin-top:10px}
.uv-fill{height:100%;border-radius:4px}

/* ── LOADING SPINNER ── */
.loader{
  width:100%;max-width:900px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;padding:60px;
}
.spinner{
  width:44px;height:44px;border:3px solid var(--border);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-text{font-size:.9rem;color:var(--text2);animation:fadeFlicker 1.5s ease infinite}
@keyframes fadeFlicker{0%,100%{opacity:.5}50%{opacity:1}}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .stats-strip{grid-template-columns:repeat(2,1fr)}
  .stats-strip .stat-block:nth-child(2){border-right:none}
  .stats-strip .stat-block:nth-child(1),.stats-strip .stat-block:nth-child(2){border-bottom:1px solid var(--border)}
  .extra-grid{grid-template-columns:1fr 1fr}
  .main-top{grid-template-columns:1fr}
  .weather-icon-big{display:none}
}
</style>
</head>

// ── RENDER ─────────────────────────────────────────────────────────
function getWeather(cityName) {
  const content = document.getElementById('weather-content');

  // Show loader
  content.innerHTML = `<div class="loader"><div class="spinner"></div><p class="loader-text">Fetching weather for ${cityName}…</p></div>`;

  // Simulate API delay
  setTimeout(() => {
    // Try exact match first, then partial
    let data = CITY_DB[cityName];
    if (!data) {
      const key = Object.keys(CITY_DB).find(k => k.toLowerCase().includes(cityName.toLowerCase()) || cityName.toLowerCase().includes(k.toLowerCase()));
      data = key ? CITY_DB[key] : null;
    }

    if (!data) {
      // Unknown city: generate plausible random data
      data = generateRandom(cityName);
    }

    renderWeather(cityName, data);
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    // Update pills
    document.querySelectorAll('.city-pill').forEach(p => {
      p.classList.toggle('active', p.dataset.city === cityName || p.textContent.includes(cityName));
    });
  }, 700);
}

function generateRandom(city) {
  const temp = Math.round(15 + Math.random()*20 - 5);
  const conds = [["Sunny","☀️"],["Partly Cloudy","⛅"],["Overcast","☁️"],["Light Rain","🌦"],["Clear","🌤"]];
  const [cond,icon] = conds[Math.floor(Math.random()*conds.length)];
  return {
    country:"Unknown Region",flag:"🌍",temp,feelsLike:temp-2,condition:cond,icon,
    humidity:Math.round(50+Math.random()*40),wind:Math.round(8+Math.random()*20),
    visibility:Math.round(8+Math.random()*12),uv:Math.round(2+Math.random()*8),
    pressure:Math.round(1005+Math.random()*20),dewpoint:Math.round(temp-8),
    airQuality:Math.round(20+Math.random()*60),aqLabel:"Moderate",
    sunrise:"06:00",sunset:"18:30",
    hourly:Array.from({length:12},(_,i)=>({time:i===0?"Now":`${i+12>12?i+12-12:i+12}${i+12>=12?'PM':'AM'}`,icon:icon,temp:temp+Math.round(Math.random()*4-2),rain:Math.round(Math.random()*30)})),
    week:['Today','Tue','Wed','Thu','Fri','Sat','Sun'].map(d=>({day:d,icon,cond,low:temp-5,high:temp+5,bar:Math.round(50+Math.random()*45)})),
  };
}

function getUVColor(uv) {
  if (uv <= 2) return '#34d399';
  if (uv <= 5) return '#fbbf24';
  if (uv <= 7) return '#f97316';
  return '#f87171';
}

function getUVLabel(uv) {
  if (uv <= 2) return 'Low';
  if (uv <= 5) return 'Moderate';
  if (uv <= 7) return 'High';
  return 'Very High';
}

function getAQColor(aq) {
  if (aq <= 50) return '#34d399';
  if (aq <= 100) return '#fbbf24';
  return '#f87171';
}

function renderWeather(cityName, d) {
  const content = document.getElementById('weather-content');

  content.innerHTML = `
  <!-- MAIN CARD -->
  <div class="main-card" style="width:100%">
    <div class="main-top">
      <div>
        <div class="city-name">${cityName} ${d.flag}</div>
        <div class="country-row"><span>📍</span>${d.country} &nbsp;·&nbsp; <span>${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</span></div>
        <div class="temp-big">${d.temp}<span class="unit">°C</span></div>
        <div class="condition">${d.icon} ${d.condition}</div>
        <div class="feels">Feels like ${d.feelsLike}°C</div>
      </div>
      <div class="weather-icon-big">${d.icon}</div>
    </div>
    <div class="stats-strip">
      <div class="stat-block"><div class="sb-icon">💧</div><div class="sb-val">${d.humidity}%</div><div class="sb-lbl">Humidity</div></div>
      <div class="stat-block"><div class="sb-icon">🌬️</div><div class="sb-val">${d.wind} km/h</div><div class="sb-lbl">Wind</div></div>
      <div class="stat-block"><div class="sb-icon">👁️</div><div class="sb-val">${d.visibility} km</div><div class="sb-lbl">Visibility</div></div>
      <div class="stat-block"><div class="sb-icon">🔵</div><div class="sb-val">${d.pressure} hPa</div><div class="sb-lbl">Pressure</div></div>
    </div>
  </div>

  <!-- HOURLY -->
  <div class="forecast-section" style="width:100%">
    <p class="sec-title">24-Hour Forecast</p>
    <div class="hourly-scroll">
      ${d.hourly.map((h,i) => `
        <div class="hour-item ${i===0?'now':''}">
          <div class="h-time">${h.time}</div>
          <div class="h-icon">${h.icon}</div>
          <div class="h-temp">${h.temp}°</div>
          ${h.rain > 0 ? `<div class="h-rain">💧${h.rain}%</div>` : '<div class="h-rain" style="opacity:0">0%</div>'}
        </div>`).join('')}
    </div>
  </div>

  <!-- 7-DAY -->
  <div class="forecast-section" style="width:100%">
    <p class="sec-title">7-Day Forecast</p>
    <div class="week-list">
      ${d.week.map((w,i)=>`
        <div class="day-row ${i===0?'today-row':''}">
          <span class="dr-day">${w.day}</span>
          <span class="dr-icon">${w.icon}</span>
          <span class="dr-cond">${w.cond}</span>
          <div class="dr-bar"><div class="dr-bar-fill" style="width:${w.bar}%"></div></div>
          <div class="dr-temps">
            <span class="dr-low">${w.low}°</span>
            <span class="dr-high">${w.high}°</span>
          </div>
        </div>`).join('')}
    </div>
  </div>

  <!-- EXTRA CARDS -->
  <div class="extra-grid" style="width:100%">
    <div class="extra-card">
      <div class="ec-label">☀️ UV Index</div>
      <div class="ec-val" style="color:${getUVColor(d.uv)}">${d.uv}</div>
      <div class="ec-sub">${getUVLabel(d.uv)} — ${d.uv>=6?'Use sunscreen!':'Low risk'}</div>
      <div class="uv-bar"><div class="uv-fill" style="width:${Math.min(d.uv/12*100,100)}%;background:${getUVColor(d.uv)}"></div></div>
    </div>
    <div class="extra-card">
      <div class="ec-label">🌅 Sun Times</div>
      <div style="display:flex;justify-content:space-between;margin-top:8px">
        <div><div style="font-size:.7rem;color:var(--text2)">Sunrise</div><div style="font-family:var(--f-d);font-size:1.1rem;font-weight:700;color:var(--accent)">${d.sunrise}</div></div>
        <div style="color:var(--text2);display:flex;align-items:center">→</div>
        <div><div style="font-size:.7rem;color:var(--text2)">Sunset</div><div style="font-family:var(--f-d);font-size:1.1rem;font-weight:700;color:var(--accent)">${d.sunset}</div></div>
      </div>
      <div class="ec-sub" style="margin-top:10px">Dew Point: ${d.dewpoint}°C</div>
    </div>
    <div class="extra-card">
      <div class="ec-label">🍃 Air Quality</div>
      <div class="ec-val" style="color:${getAQColor(d.airQuality)}">${d.airQuality}</div>
      <div class="ec-sub">${d.aqLabel} — AQI</div>
      <div class="uv-bar"><div class="uv-fill" style="width:${Math.min(d.airQuality/200*100,100)}%;background:${getAQColor(d.airQuality)}"></div></div>
    </div>
  </div>`;
}

// ── EVENT HANDLERS ─────────────────────────────────────────────────
document.getElementById('search-btn').addEventListener('click', () => {
  const city = document.getElementById('city-input').value.trim();
  if (city) getWeather(city);
});

document.getElementById('city-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const city = e.target.value.trim();
    if (city) getWeather(city);
  }
});

document.querySelectorAll('.city-pill').forEach(pill => {
  pill.addEventListener('click', function() {
    const city = this.dataset.city;
    document.getElementById('city-input').value = city;
    getWeather(city);
  });
});

// ── INIT ───────────────────────────────────────────────────────────
getWeather('Kathmandu');
</script>
</body>
</html>
